<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Primary meta -->
    <title>Afternoon Studio — Handcrafted Jewellery Inspired by Nature</title>
    <meta
      name="description"
      content="Afternoon Studio creates handcrafted jewellery deeply inspired by nature. Each piece is cast by hand from recycled precious metals, made not for fleeting moments but to be cherished across seasons and lifetimes. Shop the collection at Pepper You."
    />
    <meta name="author" content="Afternoon Studio" />
    <link rel="canonical" href="https://afternoonstudio.co.uk/" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#f3ece1" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="assets/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Afternoon Studio" />
    <meta property="og:title" content="Afternoon Studio — Handcrafted Jewellery Inspired by Nature" />
    <meta
      property="og:description"
      content="Handcrafted jewellery deeply inspired by nature, cast by hand from recycled precious metals. Shop the collection at Pepper You."
    />
    <meta property="og:url" content="https://afternoonstudio.co.uk/" />
    <meta property="og:image" content="https://afternoonstudio.co.uk/assets/og-image.jpg" />
    <meta property="og:image:secure_url" content="https://afternoonstudio.co.uk/assets/og-image.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Afternoon Studio handcrafted jewellery" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Afternoon Studio — Handcrafted Jewellery Inspired by Nature" />
    <meta
      name="twitter:description"
      content="Handcrafted jewellery deeply inspired by nature, cast by hand from recycled precious metals. Shop the collection at Pepper You."
    />
    <meta name="twitter:image" content="https://afternoonstudio.co.uk/assets/og-image.jpg" />
    <meta name="twitter:image:alt" content="Afternoon Studio handcrafted jewellery" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />

    <!-- Structured data: brand organisation -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "@id": "https://afternoonstudio.co.uk/#organization",
        "name": "Afternoon Studio",
        "alternateName": "Afternoon",
        "url": "https://afternoonstudio.co.uk/",
        "logo": "https://afternoonstudio.co.uk/assets/apple-touch-icon.png",
        "image": "https://afternoonstudio.co.uk/assets/og-image.jpg",
        "description": "Afternoon Studio creates handcrafted jewellery deeply inspired by nature. Each piece is cast by hand from recycled precious metals, made to be cherished across seasons and lifetimes.",
        "foundingDate": "2025",
        "founder": {
          "@type": "Person",
          "name": "Jade Golding"
        },
        "sameAs": [
          "https://www.instagram.com/afternoon_studiouk",
          "https://pepperyou.co.uk/collections/brand-afternoon-studio"
        ]
      }
    </script>

    <!-- Structured data: website -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "@id": "https://afternoonstudio.co.uk/#website",
        "name": "Afternoon Studio",
        "url": "https://afternoonstudio.co.uk/",
        "inLanguage": "en-GB",
        "publisher": { "@id": "https://afternoonstudio.co.uk/#organization" }
      }
    </script>
  </head>

  <body>
    <main class="page">
      <div class="card">
        <h1 class="logo" aria-label="Afternoon Studio">
          <img src="assets/logo.svg" alt="Afternoon Studio" width="349" height="103" />
        </h1>

        <p class="tagline">Inspired by nature, grounded in craft.</p>

        <p class="intro">
          Handcrafted jewellery, cast by hand from recycled precious metals &mdash; made not for fleeting moments, but to
          be cherished across seasons and lifetimes.
        </p>

        <a class="shop-button" href="https://pepperyou.co.uk/collections/brand-afternoon-studio">
          Shop the Collection
        </a>

        <p class="stocked-at">Now stocked at <span>Pepper&nbsp;You</span></p>

        <nav class="social" aria-label="Social links">
          <a
            href="https://www.instagram.com/afternoon_studiouk"
            class="social-link"
            aria-label="Afternoon Studio on Instagram"
            rel="me noopener"
            target="_blank"
          >
            <img src="assets/instagram.svg" alt="" width="22" height="22" />
          </a>
        </nav>
      </div>

      <footer class="footer">
        <p>&copy; <span id="year">2026</span> Afternoon Studio</p>
      </footer>
    </main>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
